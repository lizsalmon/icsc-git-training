name: Quality Checks

on:
  push:
  pull_request:

jobs:
  physics-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run physics analysis
        run: |
          python analyse_higgs.py > results.txt
          cat results.txt

      - name: Validate Higgs mass
        run: |
          if grep -q "PEAK_DETECTED_AT: 125.000035464645 GeV" results.txt; then
            echo "VALIDATED: HIGGS FOUND"
          else
            echo "FAILURE: MASS OFFSET DETECTED"
            exit 1
          fi

      - name: Verify calibration fix was cherry-picked
        run: |
            if git log --pretty=%B | grep -q "calibration-fix"; then
              echo "Calibration fix detected in history"
            else
              echo "Calibration fix NOT found. Cherry-pick required."
              exit 1
            fi

      - name: Ensure branch contains latest main commit
        run: |
          git fetch origin main
      
          MAIN_SHA=$(git rev-parse origin/main)
          BASE_SHA=$(git merge-base HEAD origin/main)
      
          echo "Main SHA: $MAIN_SHA"
          echo "Merge base: $BASE_SHA"
      
          if [ "$MAIN_SHA" != "$BASE_SHA" ]; then
            echo "Branch is doesnt contain latest main"
            exit 1
          else
            echo "Branch is up to date with main"
          fi
