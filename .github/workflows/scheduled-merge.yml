name: Scheduled PR merges

on:
    # - cron: "0 9 * * *"   # 09:00 UTC
  workflow_dispatch:      # allow manual trigger

permissions:
    contents: write
    pull-requests: write

jobs:
  merge-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Merge PR 9
        run: gh pr merge 9 --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait 5 minutes
        run: sleep 300

      - name: Merge PR 10
        run: gh pr merge 10 --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait 5 minutes
        run: sleep 300

      - name: Merge PR 11
        run: gh pr merge 11 --merge --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}